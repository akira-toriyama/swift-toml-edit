#:schema ./config.schema.json
# facet — per-mac-desktop sections plus a typed desktop (the modern
# [[desktop.N.section]] + [desktop.N] shape). Fixture for the per-element edit
# ops: facet's config auto-persist names unnamed workspaces, rewrites layout in
# place, and live-retargets an isolate desktop's `match`.

[theme]
name = "terminal"

# Desktop 1 — a WORKSPACE desktop: one section per workspace cell. A section is
# a plain workspace (label / layout); the desktop's `type` lives on the
# [desktop.N] table, never here.
[[desktop.1.section]]
label = "Main"
layout = "bsp"

# unnamed workspace — auto-persist upserts a `label` here. Must stay at
# ordinal 1: the edit-op tests address it by index.
[[desktop.1.section]]
layout = "stack"

# Desktop 2 — an always-on ISOLATE desktop: no sections, and `match` / `layout`
# / `show-non-matching` / `label` sit DIRECTLY on the table.
[desktop.2]
type = "isolate"
label = "Web"
match = 'app=Safari or app~=Chrome'   # live-edited at runtime
layout = "bsp"
show-non-matching = true
