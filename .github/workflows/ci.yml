name: ci

# REAL CI for swift-toml-edit — the atelier family's only repo with a genuine
# correctness gate (sill itself has none). Build + test on macOS AND Linux.
# A pure, zero-dep, Foundation-only TOML library must prove Linux parity, so
# the Linux job is first-class (and runs the upcoming `toml-test` conformance
# suite cheaply, without macOS minutes). The round-trip byte-identity goldens
# over the family's real configs run inside `swift test`, so both jobs gate them.
#
# This is deliberately NOT the family app build.yml (the macOS-only composite
# action + `<app> config --validate` smoke): there is no .app, no signing, no
# validate smoke, and we WANT Linux.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- macOS: matches the family toolchain floor ----
  test-macos:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # Zero-dep → key the SPM cache on Package.swift only (no Package.resolved).
      - uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-
      - name: Show toolchain
        run: swift --version
      - name: Build (release)
        run: swift build -c release
      - name: Test
        run: swift test

  # ---- Linux: prove parity for a general-purpose OSS TOML lib (no AppKit) ----
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build (release)
        run: swift build -c release
      - name: Test
        run: swift test
