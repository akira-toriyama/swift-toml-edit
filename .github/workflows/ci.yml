name: ci

# REAL CI for swift-toml-edit — the atelier family's only repo with a genuine
# correctness gate (sill itself has none). Build + test on macOS AND Linux.
# A pure, zero-dep, Foundation-only TOML library must prove Linux parity, so
# the Linux job is first-class (and runs the upcoming `toml-test` conformance
# suite cheaply, without macOS minutes). The round-trip byte-identity goldens
# over the family's real configs run inside `swift test`, so both jobs gate them.
#
# This is deliberately NOT the family app build.yml (the macOS-only composite
# action + `<app> config --validate` smoke): there is no .app, no signing, no
# validate smoke, and we WANT Linux.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- macOS: matches the family toolchain floor ----
  test-macos:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # Zero-dep → key the SPM cache on Package.swift only (no Package.resolved).
      - uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-
      - name: Show toolchain
        run: swift --version
      - name: Build (release)
        run: swift build -c release
      - name: Test
        run: swift test

  # ---- Linux: prove parity for a general-purpose OSS TOML lib (no AppKit) ----
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build (release)
        run: swift build -c release
      - name: Test
        run: swift test

  # ---- Official toml-test conformance (the correctness gate that makes this
  #      a real OSS TOML library). Runner is a Go program embedding the corpus;
  #      pinned to v2.2.0 for reproducibility and to TOML 1.0.0 on every run
  #      (v2 defaults to 1.1, whose draft tests a 1.0 parser must reject). ----
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Install toml-test (pinned)
        run: go install github.com/toml-lang/toml-test/v2/cmd/toml-test@v2.2.0
      - name: Build conformance binaries (release)
        # Build each product separately: `swift build` honours only the LAST
        # `--product` when several are passed, so one combined invocation would
        # leave the other binary unbuilt.
        run: |
          swift build -c release --product toml-decode
          swift build -c release --product toml-encode
      - name: Decoder conformance (TOML 1.0.0)
        run: |
          "$(go env GOPATH)/bin/toml-test" test -toml=1.0 \
            -decoder="$PWD/.build/release/toml-decode"
      - name: Encoder conformance (TOML 1.0.0)
        run: |
          "$(go env GOPATH)/bin/toml-test" test -toml=1.0 \
            -decoder="$PWD/.build/release/toml-decode" \
            -encoder="$PWD/.build/release/toml-encode"
